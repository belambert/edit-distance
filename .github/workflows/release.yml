name: upload to pypi

on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0  # hatch-vcs derives the version from the release tag
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.x"
      - name: Build package
        run: uv build
      - name: Publish package
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: uv publish
